<title>Acesso ao Reset Postural</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root { --vio:#7c3aed; --ind:#4f46e5; --bg:#f5f6fb; --ink:#16183a; --muted:#616a8c; --line:#e4e7f2; }
  html, body { background:var(--bg); }
  body {
    font-family:'Inter',-apple-system,Roboto,system-ui,sans-serif;
    color:var(--ink); min-height:100vh;
    background:
      radial-gradient(700px 420px at 50% -10%, rgba(124,58,237,0.14), transparent 65%),
      var(--bg);
    display:flex; align-items:center; justify-content:center; padding:26px 18px;
  }
  .cofre { width:100%; max-width:380px; text-align:center; }
  .cad { width:64px; height:64px; margin:0 auto 14px; border-radius:20px; display:grid; place-items:center;
    font-size:30px; background:linear-gradient(150deg,var(--vio),var(--ind)); box-shadow:0 14px 30px -8px rgba(124,58,237,.5); }
  .badge {
    display:inline-block; font-size:11.5px; font-weight:700; letter-spacing:1.4px;
    text-transform:uppercase; color:var(--vio); background:#f0ebfe;
    border:1px solid #e0d6fb; padding:6px 14px; border-radius:999px; margin-bottom:14px;
  }
  h1 { font-family:'Space Grotesk',sans-serif; font-size:25px; font-weight:700; line-height:1.15; letter-spacing:-0.6px; }
  h1 span { color:var(--vio); }
  .sub { color:var(--muted); font-size:14px; margin:10px 0 20px; line-height:1.45; }
  .painel {
    background:#fff; border:1px solid var(--line); border-radius:22px;
    padding:22px 20px; box-shadow:0 16px 40px -16px rgba(22,24,58,0.18);
  }
  input {
    width:100%; background:var(--bg); border:1.6px solid var(--line);
    border-radius:14px; color:var(--ink); font-size:18px; font-weight:700;
    padding:16px; outline:none; text-align:center; transition:border-color .15s, box-shadow .15s;
  }
  input::placeholder { color:#a9aec7; font-weight:600; }
  input:focus { border-color:var(--vio); background:#fff; box-shadow:0 0 0 4px rgba(124,58,237,0.12); }
  button {
    width:100%; border:none; border-radius:14px;
    background:linear-gradient(100deg,var(--vio),var(--ind)); color:#fff;
    font-family:'Space Grotesk',sans-serif; font-size:17px; font-weight:700; padding:17px; margin-top:12px; cursor:pointer;
    box-shadow:0 12px 26px -8px rgba(124,58,237,0.5); transition:transform .08s;
  }
  button:active { transform:scale(0.985); }
  button:disabled { opacity:0.6; cursor:default; }
  .erro {
    display:none; margin-top:14px; font-size:14px; font-weight:600; color:#9a2424;
    background:#fdeaea; border:1px solid #f3c1c1;
    border-radius:12px; padding:12px 14px;
  }
  .naoaluno {
    margin-top:16px; padding:16px 18px; border-radius:16px; text-align:center;
    background:#fff; border:1px solid var(--line);
    font-size:13.5px; color:var(--muted); line-height:1.5;
  }
  .btn-comprar {
    display:flex; align-items:center; justify-content:center; gap:8px;
    margin-top:13px; padding:14px; border-radius:12px;
    background:linear-gradient(135deg,var(--vio),var(--ind)); color:#fff;
    font-weight:700; font-size:14.5px; text-decoration:none;
    box-shadow:0 10px 22px -8px rgba(124,58,237,0.45); transition:transform .08s;
  }
  .btn-comprar:active { transform:scale(0.985); }
  footer { margin-top:22px; font-size:13px; color:var(--muted); font-weight:600; }
  footer b { color:var(--vio); }
</style>
</head>
<body>
  <div class="cofre">
    <div class="cad">📐</div>
    <div class="badge">Área de quem comprou</div>
    <h1>Reset <span>Postural</span></h1>
    <p class="sub">Conteúdo exclusivo. Digite a senha de acesso pra entrar.</p>
    <div class="painel">
      <input id="senha" type="password" inputmode="text" placeholder="Sua senha" autocomplete="off" autofocus>
      <button id="entrar">Entrar</button>
      <div class="erro" id="erro">Senha incorreta. Confira e tente de novo.</div>
    </div>

    <div class="naoaluno">
      Ainda não tem o Reset Postural?
      <a class="btn-comprar" href="https://lucaslimaef.github.io/reset-postural/" target="_blank" rel="noopener">
        Quero endireitar minha postura →
      </a>
    </div>

    <footer>Feito por <b>@personaltrainerlucaslima</b></footer>
  </div>

  function b2u(b){ return Uint8Array.from(atob(b), function(c){ return c.charCodeAt(0); }); }
  var senhaEl=document.getElementById('senha'), btn=document.getElementById('entrar'), erroEl=document.getElementById('erro');

  async function entrar(silencioso){
    erroEl.style.display='none';
    var senha=senhaEl.value;
    if(!senha){ return; }
    btn.disabled=true; btn.textContent='Abrindo...';
    try{
      var enc=new TextEncoder();
      var km=await crypto.subtle.importKey('raw', enc.encode(senha), 'PBKDF2', false, ['deriveKey']);
      var key=await crypto.subtle.deriveKey(
        { name:'PBKDF2', salt:b2u(SALT), iterations:ITER, hash:'SHA-256' },
        km, { name:'AES-GCM', length:256 }, false, ['decrypt']);
      var plano=await crypto.subtle.decrypt({ name:'AES-GCM', iv:b2u(IV) }, key, b2u(DADOS));
      var html=new TextDecoder().decode(plano);
      document.open(); document.write(html); document.close();
    }catch(e){
      btn.disabled=false; btn.textContent='Entrar';
      if(!silencioso){ erroEl.style.display='block'; }
      senhaEl.value=''; senhaEl.focus();
    }
  }
  btn.addEventListener('click', function(){ entrar(false); });
  senhaEl.addEventListener('keydown', function(e){ if(e.key==='Enter') entrar(false); });

  // Auto-destrava se vier com a senha no link (?k=SENHA), ex: redirect do Stripe pós-compra
  (function(){
    var k=new URLSearchParams(location.search).get('k');
    if(k){ senhaEl.value=k; entrar(true); }
